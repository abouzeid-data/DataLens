name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build DataLens
        shell: pwsh
        run: ./build_windows.ps1

      - name: Upload downloadable app
        uses: actions/upload-artifact@v4
        with:
          name: DataLens-windows
          path: DataLens-windows.zip
